name: Python setup

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pytest flake8

      - name: Python version verification
        run: python --version

      - name: Flake8 check
        run: flake8 --version

      - name: Pytest check
        run: pytest --version
